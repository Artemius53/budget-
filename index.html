<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Гроссбух">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#DEE3D6">
<title>Гроссбух</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "88ee6a98-6240-4163-affd-f898481352d6",
      safari_web_id: "web.onesignal.auto.1a94b592-c98a-427e-9490-520bfcd23754",
      serviceWorkerPath: "budget-/OneSignalSDKWorker.js",
      serviceWorkerParam: { scope: "/budget-/" },
    });
  });
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #DEE3D6;
    --paper: #EEF1E9;
    --line: #C9CFC0;
    --ink: #1C2B22;
    --ink-soft: #5B6B5F;
    --copper: #A6672C;
    --forest: #2F5233;
    --rust: #A63A2E;
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust: 100%; }
  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, rgba(28,43,34,0.06) 1px, transparent 0);
    background-size: 18px 18px;
    display:flex;
    justify-content:center;
    padding: max(24px, env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    font-family: 'Bitter', Georgia, serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .card{
    position:relative;
    width:100%;
    max-width:440px;
    background: var(--paper);
    box-shadow: 0 24px 48px rgba(28,43,34,0.16);
    padding: 34px 26px 26px;
  }
  .bell-btn{
    position:absolute;
    top:14px;
    right:16px;
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    background:#fff;
    font-size:16px;
    line-height:1;
    cursor:pointer;
    z-index:5;
    -webkit-tap-highlight-color: transparent;
  }
  .bell-btn:active{ background: rgba(28,43,34,0.06); }
  .history-btn{ right:56px; }
  .card::before, .card::after{
    content:'';
    position:absolute;
    left:0; right:0;
    height:14px;
    background: radial-gradient(circle at 10px 7px, var(--bg) 6px, transparent 6.5px);
    background-size: 20px 14px;
  }
  .card::before{ top:-1px; }
  .card::after{ bottom:-1px; }

  h1{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 24px;
    text-align:center;
    margin: 4px 0 2px;
  }
  .sub{
    text-align:center;
    font-size:12px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .sync-status{
    text-align:center;
    font-size:10px;
    color: var(--forest);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }
  .sync-status.offline{ color: var(--rust); }

  .balance-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 14px;
    background: rgba(28,43,34,0.05);
    border-radius:8px;
    margin-bottom: 14px;
    font-size:13px;
    color: var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .balance-bar .balance-val{
    font-family:'IBM Plex Mono', monospace;
    font-size:17px;
    font-weight:600;
    letter-spacing:0;
  }
  .balance-bar .balance-val.pos{ color: var(--forest); }
  .balance-bar .balance-val.neg{ color: var(--rust); }
  .limit-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 8px 14px;
    background: rgba(166,103,44,0.08);
    border-radius:8px;
    margin-bottom: 14px;
    font-size:12px;
    color: var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .limit-bar input{
    width:100px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:15px;
    border:none;
    background:transparent;
    color: var(--copper);
    font-weight:600;
  }

  .tabs{
    display:flex;
    gap:0;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 18px;
    position: sticky;
    top: env(safe-area-inset-top, 0px);
    background: var(--paper);
    z-index: 20;
    box-shadow: 0 4px 8px -4px rgba(28,43,34,0.08);
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 10px 1px;
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:9.5px;
    letter-spacing:0.3px;
    text-transform:uppercase;
    color: var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    position:relative;
    top:2px;
    white-space:nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active{
    color: var(--ink);
    border-bottom: 2px solid var(--copper);
  }

  .home-greeting{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:18px;
    text-align:center;
    margin-bottom:16px;
  }
  .cal-nav{
    display:flex; align-items:center; justify-content:center;
    gap:14px; margin-bottom:10px;
  }
  .cal-nav button{
    background: rgba(28,43,34,0.06); border:none;
    width:30px; height:30px; border-radius:50%;
    font-size:16px; color: var(--ink); cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-grid{
    display:grid; grid-template-columns: repeat(7, 1fr);
    gap:4px; margin-bottom:4px;
  }
  .cal-weekdays div{
    text-align:center; font-size:10px; text-transform:uppercase;
    color: var(--ink-soft); letter-spacing:0.5px;
  }
  .cal-day{
    aspect-ratio:1; border:none; background: rgba(28,43,34,0.04);
    border-radius:6px; font-family:'IBM Plex Mono',monospace;
    font-size:13px; color: var(--ink); cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .cal-day.today{ border:1px solid var(--copper); }
  .cal-day.selected{ background: var(--ink); color: var(--paper); }

  .month-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 16px;
  }
  .month-nav button{
    background: rgba(28,43,34,0.06);
    border:none;
    width:30px; height:30px;
    border-radius:50%;
    font-size:16px;
    color: var(--ink);
    cursor:pointer;
    flex-shrink:0;
    -webkit-tap-highlight-color: transparent;
  }
  .month-nav button:active{ background: rgba(28,43,34,0.14); }
  .month-nav .month-label{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    text-align:center;
    white-space:nowrap;
  }

  .subtabs{
    display:flex;
    gap:6px;
    margin-bottom:16px;
  }
  .subtab{
    flex:1;
    text-align:center;
    padding:7px 2px;
    font-size:10.5px;
    font-weight:600;
    border-radius:6px;
    border:1px solid var(--line);
    background:#fff;
    color: var(--ink-soft);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .subtab.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .budget-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    font-size:13px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .budget-row input{
    width:110px;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    border:none;
    border-bottom:1px dashed var(--line);
    background:transparent;
    color: var(--ink);
    padding:2px 2px 4px;
  }
  .budget-row input:focus-visible{ outline: 2px solid var(--copper); outline-offset:2px; }

  form.add{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    padding: 16px 0 18px;
    border-top: 1px dashed var(--line);
    border-bottom: 1px dashed var(--line);
    margin-bottom: 18px;
  }
  form.add .full{ grid-column: 1 / -1; }
  form.add label{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin-bottom:4px;
  }
  form.add input, form.add select{
    width:100%;
    font-family:'Bitter', Georgia, serif;
    font-size:16px;
    padding:10px 10px;
    border:1px solid var(--line);
    background:#fff;
    color: var(--ink);
    border-radius:6px;
  }
  form.add input[type="number"]{ font-family:'IBM Plex Mono', monospace; }
  form.add input[type="date"]{
    -webkit-appearance: none;
    appearance: none;
    height: 44px;
    line-height: 1.2;
    text-align: left;
    min-width: 0;
  }
  form.add input:focus-visible, form.add select:focus-visible{
    outline:2px solid var(--copper); outline-offset:1px;
  }
  button.submit{
    grid-column: 1 / -1;
    margin-top:4px;
    background: var(--ink);
    color: var(--paper);
    border:none;
    padding:14px;
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:14px;
    cursor:pointer;
    border-radius:6px;
    -webkit-tap-highlight-color: transparent;
  }
  button.submit:hover{ background: var(--forest); }
  button.submit:focus-visible{ outline:2px solid var(--copper); outline-offset:2px; }

  .list{ min-height: 40px; }
  .row{
    display:flex;
    align-items:baseline;
    gap:6px;
    padding: 9px 0;
    font-size:13px;
  }
  .row .date{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color: var(--ink-soft);
    width:42px;
    flex-shrink:0;
  }
  .row .desc{
    display:flex;
    flex-direction:column;
    flex-shrink:0;
    max-width:40%;
  }
  .row .cat{ font-weight:600; }
  .row .place{ font-size:11px; color: var(--ink-soft); }
  .row .note{ font-size:11px; color: var(--ink-soft); font-style:italic; }
  .row .leader{
    flex:1;
    border-bottom: 1px dotted var(--line);
    margin: 0 4px 4px;
  }
  .row .amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    flex-shrink:0;
  }
  .row .del{
    background:none;
    border:none;
    color: var(--ink-soft);
    cursor:pointer;
    font-size:20px;
    line-height:1;
    padding:4px 4px 4px 10px;
    flex-shrink:0;
    -webkit-tap-highlight-color: transparent;
  }
  .row .del:hover, .row .del:active{ color: var(--rust); }
  .row-entry{ padding: 9px 0; }
  .row-entry + .row-entry{ border-top: 1px solid rgba(28,43,34,0.05); }
  .date-header{
    font-family:'Bitter', Georgia, serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--copper);
    margin-top:14px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .date-header:first-child{ margin-top:0; }
  .row-meta{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
    margin-top:3px;
    padding-left:48px;
  }
  .tag{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color: var(--ink-soft);
    background: rgba(28,43,34,0.06);
    border-radius:3px;
    padding:2px 6px;
  }
  .tag.recurring{ color: var(--copper); background: rgba(166,103,44,0.12); }
  .tag.person{ color: var(--forest); background: rgba(47,82,51,0.12); font-weight:600; }
  .tag.priority-high{ color: var(--rust); background: rgba(166,58,46,0.12); }
  .tag.priority-mid{ color: var(--copper); background: rgba(166,103,44,0.12); }
  .tag.priority-low{ color: var(--ink-soft); }

  .buy-btn{
    margin-left:auto;
    font-family:'Bitter', Georgia, serif;
    font-size:11px;
    color: var(--forest);
    background: rgba(47,82,51,0.1);
    border:1px solid rgba(47,82,51,0.3);
    border-radius:3px;
    padding:6px 10px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .buy-btn:hover{ background: var(--forest); color: var(--paper); }

  .breakdown{
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .breakdown-title{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin-bottom:8px;
  }
  .bd-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    margin-bottom:6px;
  }
  .bd-row .bd-label{ width:84px; flex-shrink:0; }
  .bd-row.top .bd-label{ color: var(--rust); font-weight:600; }
  .bd-row .bd-bar-track{
    flex:1;
    height:6px;
    background: rgba(28,43,34,0.08);
    border-radius:3px;
    overflow:hidden;
  }
  .bd-row .bd-bar-fill{
    height:100%;
    background: var(--copper);
    border-radius:3px;
  }
  .bd-row.top .bd-bar-fill{ background: var(--rust); }
  .bd-row .bd-amount{
    font-family:'IBM Plex Mono', monospace;
    width:64px;
    text-align:right;
    flex-shrink:0;
  }
  .bd-row.top .bd-amount{ color: var(--rust); font-weight:600; }

  .totals-box{
    margin-top:16px;
    padding:14px;
    border:2px solid var(--ink);
    border-radius:8px;
  }
  .totals-box .tb-title{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-align:center;
    margin-bottom:12px;
  }
  .tb-section-title{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin:10px 0 6px;
  }
  .trend-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:5px;
  }
  .trend-month{
    width:38px;
    flex-shrink:0;
    font-size:11px;
    text-transform:uppercase;
    color: var(--ink-soft);
  }
  .trend-bars{ flex:1; display:flex; flex-direction:column; gap:2px; }
  .trend-bar-track{
    height:6px;
    background: rgba(28,43,34,0.07);
    border-radius:3px;
    overflow:hidden;
  }
  .trend-bar{ height:100%; border-radius:3px; }
  .trend-bar.income{ background: var(--forest); }
  .trend-bar.expense{ background: var(--rust); }
  .empty{
    text-align:center;
    color: var(--ink-soft);
    font-size:13px;
    padding: 24px 0;
  }
  .donut-wrap{ display:flex; align-items:center; gap:14px; margin:10px 0; }
  .donut{
    width:96px; height:96px; border-radius:50%; flex-shrink:0;
    position:relative;
  }
  .donut::after{
    content:''; position:absolute; inset:22px;
    background: var(--paper); border-radius:50%;
  }
  .donut-legend{ flex:1; display:flex; flex-direction:column; gap:4px; }
  .donut-legend-row{ display:flex; align-items:center; gap:6px; font-size:11px; }
  .donut-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .donut-legend-label{ flex:1; color: var(--ink-soft); }
  .donut-legend-pct{ font-family:'IBM Plex Mono',monospace; font-weight:600; }

  .totals{
    margin-top: 12px;
    padding-top: 14px;
    border-top: 2px solid var(--ink);
  }
  .totals .row2{
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    margin-bottom:4px;
  }
  .totals .row2.total{ font-weight:600; font-size:16px; }
  .totals .row2 .neg{ color: var(--rust); }
  .totals .row2 .pos{ color: var(--forest); }

  /* Список покупок */
  .shop-row{
    display:flex;
    align-items:stretch;
    gap:8px;
    margin-bottom:7px;
  }
  .shop-item{
    display:flex;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:8px 10px;
    padding:11px 10px;
    border-radius:6px;
    flex:1;
    min-width:0;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .shop-item:active{ opacity:0.85; }
  .shop-item.bought{ background: rgba(47,82,51,0.12); border-color: rgba(47,82,51,0.4); }
  .shop-item.notbought{ background: rgba(166,58,46,0.09); border-color: rgba(166,58,46,0.35); }
  .shop-del-tile{
    flex-shrink:0;
    width:40px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#fff;
    color: var(--ink-soft);
    font-size:18px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .shop-del-tile:active{ color: var(--rust); border-color: var(--rust); }
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:14px;
  }
  .chip{
    display:inline-flex;
    align-items:center;
    gap:4px;
    font-size:11px;
    padding:2px 2px 2px 10px;
    border-radius:14px;
    border:1px solid var(--line);
    background:#fff;
    color: var(--ink-soft);
  }
  .chip-add{
    background:none;
    border:none;
    font-size:11px;
    color: var(--ink-soft);
    cursor:pointer;
    padding:3px 0;
    -webkit-tap-highlight-color: transparent;
  }
  .chip-add:active{ color: var(--ink); }
  .chip-del{
    background: rgba(28,43,34,0.06);
    border:none;
    border-radius:50%;
    width:18px; height:18px;
    font-size:12px;
    line-height:1;
    color: var(--ink-soft);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .chip-del:active{ color: var(--rust); background: rgba(166,58,46,0.12); }
  .shop-check{
    width:26px; height:26px;
    margin-top:1px;
    border-radius:50%;
    border:2px solid var(--ink-soft);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:#fff;
  }
  .shop-item.bought .shop-check{ background: var(--forest); border-color: var(--forest); }
  .shop-main{ flex:1; min-width:120px; }
  .shop-name-row{ display:flex; align-items:center; gap:6px; }
  .shop-item .shop-name{ font-size:15px; }
  .shop-item.bought .shop-name{ text-decoration: line-through; color: var(--ink-soft); }
  .shop-edit{
    background:none; border:none; color: var(--ink-soft);
    cursor:pointer; font-size:13px; padding:2px 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .shop-edit:active{ color: var(--copper); }
  .shop-item .shop-cat{ font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color: var(--ink-soft); display:block; }
  .shop-controls{
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    flex-wrap:wrap;
    margin-left:auto;
  }
  .qty-stepper{
    display:flex; align-items:center; gap:0;
    border:1px solid var(--line); border-radius:6px; overflow:hidden;
    background:#fff;
  }
  .qty-stepper button{
    width:30px; height:30px;
    border:none; background: rgba(28,43,34,0.05);
    font-size:16px; color: var(--ink); cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .qty-stepper button:active{ background: rgba(28,43,34,0.12); }
  .qty-stepper .qty-val{
    min-width:22px; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-size:14px;
  }
  .shop-item .shop-price-input{
    width:80px;
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:6px;
    text-align:right;
  }
  .shop-item .shop-line-total{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--ink-soft);
    width:100%;
    text-align:right;
  }
  .shop-item .del{
    background:none; border:none; color: var(--ink-soft);
    cursor:pointer; font-size:20px; padding:0 0 0 4px;
    flex-shrink:0;

function fmt(n){
  return n.toLocaleString('ru-RU', {minimumFractionDigits:0, maximumFractionDigits:2});

const DONUT_PALETTE = ['#A6672C','#2F5233','#A63A2E','#5B6B5F','#7A8B6F','#C99A5B','#3D5A47','#8B4A3A','#6B7A5F','#B8895A','#4A6350'];
function buildDonut(entries){
  const total = entries.reduce((s,e)=>s+e[1],0);
  if(total<=0) return '';
  let acc = 0;
  const stops = entries.map(([label,val],i)=>{
    const start = (acc/total*100).toFixed(1);
    acc += val;
    const end = (acc/total*100).toFixed(1);
    return `${DONUT_PALETTE[i%DONUT_PALETTE.length]} ${start}% ${end}%`;
  }).join(', ');
  const legend = entries.map(([label,val],i)=>`
    <div class="donut-legend-row">
      <span class="donut-dot" style="background:${DONUT_PALETTE[i%DONUT_PALETTE.length]}"></span>
      <span class="donut-legend-label">${label}</span>
      <span class="donut-legend-pct">${(val/total*100).toFixed(0)}%</span>
    </div>`).join('');
  return `
    <div class="donut-wrap">
      <div class="donut" style="background: conic-gradient(${stops});"></div>
      <div class="donut-legend">${legend}</div>
    </div>
  `;
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function shortDate(iso){ const [y,m,d] = iso.split('-'); return d+'.'+m; }
function tomorrowStr(){ const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function dateLabel(iso){
  if(iso===todayStr()) return 'Сегодня';
  if(iso===tomorrowStr()) return 'Завтра';
  return shortDate(iso);
}
function monthOf(iso){ return iso ? iso.slice(0,7) : ''; }
function priorityClass(p){
  if(p==='Высокий') return 'priority-high';
  if(p==='Средний') return 'priority-mid';
  return 'priority-low';
}
const MONTH_NAMES = ["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
function monthLabel(ym){
  const [y,m] = ym.split('-');
  return MONTH_NAMES[parseInt(m,10)-1] + ' ' + y;
}
function shiftMonth(ym, delta){
  let [y,m] = ym.split('-').map(Number);
  m += delta;
  if(m<1){ m=12; y--; }
  if(m>12){ m=1; y++; }
  return y + '-' + String(m).padStart(2,'0');
}

onSnapshot(budgetDocRef, (snap)=>{
  connected = true;
  if(snap.exists()){
    const data = snap.data();
    expenses = data.expenses || [];
    incomes = data.incomes || [];
    budgetLimit = (data.budgetLimit === undefined) ? null : data.budgetLimit;
    shopping = data.shopping || [];
    planned = data.planned || [];
    accounts = data.accounts || [];
    dailyLimit = (data.dailyLimit===undefined)? null : data.dailyLimit;
    credits = data.credits || [];
    goals = data.goals || [];
    shopHistory = data.shopHistory || [];
    categoryLimits = data.categoryLimits || {};
    lastShoppingList = data.lastShoppingList || [];

    const oldWishes = data.wishes || [];
    if(oldWishes.length){
      oldWishes.forEach(w=>{
        goals.push({ id:newId(), name:w.name, target:w.target, saved:w.saved||0, person:w.person });
      });
      saveAll();
    }
  }
  firstLoad = false;
  render();
}, (err)=>{
  console.error('Ошибка синхронизации', err);
  connected = false;
  firstLoad = false;
  render();
});

  }catch(e){ console.error('Не удалось сохранить данные', e); }
}

function newId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---- Расходы ---- */
function addExpense(amount, category, note, date, place, paymentMethod, recurring, person, accountId, expType, creditId, tags){
  expenses.push({ id:newId(), amount, category, note, date, place, paymentMethod, recurring, person, accountId: accountId||null, expType: expType||'Необходимые', creditId: creditId||null, tags: tags||[] });
  expenses.sort((a,b)=> a.date < b.date ? 1 : -1);
  saveAll(); render();
  sendPushToOther(person, 'Новый расход', `${person} добавил(а) расход: ${fmt(amount)} ₽ (${category})`);
}
function deleteExpense(id){ expenses = expenses.filter(e=>e.id!==id); saveAll(); render(); }

/* ---- Доходы ---- */
function addIncome(amount, category, note, date, person, accountId){
  incomes.push({ id:newId(), amount, category, note, date, person, accountId: accountId||null });
  incomes.sort((a,b)=> a.date < b.date ? 1 : -1);
  saveAll(); render();
  sendPushToOther(person, 'Новый доход', `${person} добавил(а) доход: ${fmt(amount)} ₽ (${category})`);
}
function deleteIncome(id){ incomes = incomes.filter(e=>e.id!==id); saveAll(); render(); }

/* ---- Список покупок ---- */
function addShopItem(name, category, person, qty){
  shopping.push({ id:newId(), name, category, person, bought:false, price:null, qty: qty||1 });
  if(!shopHistory.some(h=>h.name.toLowerCase()===name.toLowerCase())){
    shopHistory.push({ name, category });
  }
  saveAll(); render();
  sendPushToOther(person, 'Новая покупка в списке', `${person} добавил(а) в список: ${name}`);
}
function deleteShopHistoryItem(name){
  shopHistory = shopHistory.filter(h=>h.name!==name);
  saveAll(); render();
}
function deleteShopItem(id){
  const item = shopping.find(s=>s.id===id);
  if(item && item.expenseId) expenses = expenses.filter(e=>e.id!==item.expenseId);
  shopping = shopping.filter(s=>s.id!==id);
  saveAll(); render();
}
function renameShopItem(id){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  const name = prompt('Название товара', item.name);
  if(name===null) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  item.name = trimmed;
  if(item.expenseId){
    const ex = expenses.find(e=>e.id===item.expenseId);
    if(ex) ex.note = trimmed;
  }
  saveAll(); render();
}
function syncShopExpense(item){
  const lineTotal = (item.qty||1) * (item.price||0);
  if(item.bought && item.price){
    if(item.expenseId){
      const ex = expenses.find(e=>e.id===item.expenseId);
      if(ex){ ex.amount = lineTotal; ex.note = item.name + (item.qty>1? ` ×${item.qty}`:''); }
    } else {
      const eid = newId();
      item.expenseId = eid;
      expenses.push({ id:eid, amount:lineTotal, category:item.category||'Другое', note:item.name+(item.qty>1?` ×${item.qty}`:''), date:todayStr(), place:'', paymentMethod:'Карта', recurring:'Разовый', person:item.person });
      expenses.sort((a,b)=> a.date < b.date ? 1 : -1);
    }
  }
  if((!item.bought || !item.price) && item.expenseId){
    expenses = expenses.filter(e=>e.id!==item.expenseId);
    item.expenseId = null;
  }
}
function toggleBought(id){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.bought = !item.bought;
  syncShopExpense(item);
  saveAll(); render();
}
function setShopPrice(id, price){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.price = price;
  syncShopExpense(item);
  saveAll(); render();
}
function changeShopQty(id, delta){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.qty = Math.max(1, (item.qty||1) + delta);
  syncShopExpense(item);
  saveAll(); render();
}
function clearBoughtShop(){
  if(!confirm('Убрать все купленные товары из списка? (расходы по ним останутся)')) return;
  const boughtItems = shopping.filter(s=>s.bought);
  if(boughtItems.length){
    lastShoppingList = boughtItems.map(s=>({ name:s.name, category:s.category }));
  }
  shopping = shopping.filter(s=>!s.bought);
  saveAll(); render();
}

function deleteGoal(id){ goals = goals.filter(g=>g.id!==id); saveAll(); render(); }

function addExpectedIncome(amount, category, date, note, person){

/* ---- Счета и балансы ---- */
function addAccount(owner, bank, initialBalance){
  accounts.push({ id:newId(), owner, bank, initialBalance, initialDate: todayStr() });
  saveAll(); render();
}
function deleteAccount(id){ accounts = accounts.filter(a=>a.id!==id); saveAll(); render(); }
function accountBalanceAsOf(acc, asOfDate){
  if(asOfDate < acc.initialDate) return null; // до создания счёта баланс неизвестен
  let bal = acc.initialBalance;
  incomes.forEach(i=>{ if(i.accountId===acc.id && i.date>acc.initialDate && i.date<=asOfDate) bal += i.amount; });
  expenses.forEach(e=>{ if(e.accountId===acc.id && e.date>acc.initialDate && e.date<=asOfDate) bal -= e.amount; });
  return bal;
}
function totalBalanceAsOf(asOfDate){
  return accounts.reduce((s,a)=>{ const v = accountBalanceAsOf(a, asOfDate); return s + (v==null?0:v); }, 0);
}
function setDailyLimit(value){ dailyLimit = value; saveAll(); render(); }
function setCategoryLimit(category, value){
  if(value==null){ delete categoryLimits[category]; }
  else { categoryLimits[category] = value; }
  saveAll(); render();
}

function addCredit(person, name, creditType, totalDebt, rate, monthlyPayment, paymentDay){

  saveAll(); render();
}
function deleteCredit(id){ credits = credits.filter(c=>c.id!==id); saveAll(); render(); }
function creditRemaining(c){
  const paid = expenses.filter(e=>e.creditId===c.id).reduce((s,e)=>s+e.amount,0);
  return Math.max(0, c.totalDebt - paid);
}
function creditPaidThisMonth(c){
  const ym = monthOf(todayStr());
  return expenses.some(e=>e.creditId===c.id && monthOf(e.date)===ym);
}
function payCreditNow(id){
  const c = credits.find(x=>x.id===id);

      localStorage.setItem('devicePerson', p);

  const subs = {};
  monthExp.filter(e=>e.recurring==='Регулярный').forEach(e=>{
    const key = e.note || e.category;
    subs[key] = (subs[key]||0) + e.amount;
  });
  const subsTotal = Object.values(subs).reduce((s,v)=>s+v,0);
  const subsList = Object.entries(subs).sort((a,b)=>b[1]-a[1]);

  return `
    <div class="home-greeting">Привет, ${getDevicePerson()}! 👋</div>

        <div class="row2"><span>Прогноз с учётом ожидаемых доходов</span><span>${fmt(forecastBalance)} ₽</span></div>
      </div>
    </div>

      <div class="tb-title">Итого за ${monthLabel(ym)}</div>
      <div class="totals">
        <div class="row2"><span>Доходы</span><span class="pos">+${fmt(totalInc)} ₽</span></div>
        <div class="row2"><span>Расходы</span><span class="neg">−${fmt(totalExp)} ₽</span></div>
        <div class="row2 total"><span>Разница</span><span class="${(totalInc-totalExp)<0?'neg':'pos'}">${(totalInc-totalExp)>=0?'+':''}${fmt(totalInc-totalExp)} ₽</span></div>
      </div>
    </div>

    <div class="totals-box" style="margin-top:16px">
      <div class="tb-title">Кредиты</div>
      <div class="totals">
        <div class="row2 total"><span>Остаток долга</span><span class="neg">${fmt(creditsRemaining)} ₽</span></div>
      </div>
      ${upcomingCredits.length? upcomingCredits.map(c=>`
        <div class="row2" style="color:var(--rust)"><span>⚠ ${c.name}</span><span>платёж ${c.paymentDay} числа</span></div>
      `).join('') : '<div class="empty" style="padding:6px 0">Ближайших платежей нет</div>'}
    </div>

    <div class="totals-box" style="margin-top:16px">
      <div class="tb-title">Накопления</div>
      <div class="totals">
        <div class="row2"><span>Накоплено</span><span class="pos">${fmt(goalsSaved)} ₽</span></div>
        <div class="row2 total"><span>Общая цель</span><span>${fmt(goalsTarget)} ₽</span></div>
      </div>
    </div>

    ${subsList.length? `
    <div class="totals-box" style="margin-top:16px">
      <div class="tb-title">Подписки и регулярные платежи</div>
      ${subsList.map(([name,val])=>`
        <div class="row2"><span>${name}</span><span>${fmt(val)} ₽/мес</span></div>
      `).join('')}
      <div class="totals" style="margin-top:8px">
        <div class="row2 total"><span>Итого в месяц</span><span>${fmt(subsTotal)} ₽</span></div>
      </div>
    </div>` : ''}
  `;
}

function renderFinanceTab(){
  const monthExp = expenses.filter(e=> monthOf(e.date)===viewMonth);
  const monthInc = incomes.filter(e=> monthOf(e.date)===viewMonth);
  const totalExp = monthExp.reduce((s,e)=>s+e.amount,0);
  const totalInc = monthInc.reduce((s,e)=>s+e.amount,0);

  const monthNav = `
    <div class="month-nav">
      <button id="prevMonth" aria-label="Предыдущий месяц">‹</button>
      <span class="month-label">${monthLabel(viewMonth)}</span>
      <button id="nextMonth" aria-label="Следующий месяц">›</button>
    </div>
  `;

  const subtabs = `
    <div class="subtabs">
      <div class="subtab ${financeSub==='expenses'?'active':''}" id="subExp">Расходы</div>
      <div class="subtab ${financeSub==='income'?'active':''}" id="subInc">Доходы</div>
      <div class="subtab ${financeSub==='credits'?'active':''}" id="subCredits">Кредиты</div>
      <div class="subtab ${financeSub==='savings'?'active':''}" id="subSavings">Накопления</div>
    </div>
  `;

  // Плашка ИТОГО — по категориям
  const expByCat = {};
  monthExp.forEach(e=>{ expByCat[e.category]=(expByCat[e.category]||0)+e.amount; });
  const incByCat = {};
  monthInc.forEach(e=>{ incByCat[e.category]=(incByCat[e.category]||0)+e.amount; });

  const expSorted = Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
  const incSorted = Object.entries(incByCat).sort((a,b)=>b[1]-a[1]);
  const maxExp = expSorted.length? expSorted[0][1] : 0;
  const maxInc = incSorted.length? incSorted[0][1] : 0;

  // Тренд доходы/расходы — Дни / Месяцы / Годы
  let trendData = [];
  if(trendGranularity==='day'){
    let d0 = new Date();
    for(let i=13;i>=0;i--){
      const d = new Date(d0); d.setDate(d.getDate()-i);
      const ds = d.toISOString().slice(0,10);
      const inc = incomes.filter(e=>e.date===ds).reduce((s,e)=>s+e.amount,0);
      const exp = expenses.filter(e=>e.date===ds).reduce((s,e)=>s+e.amount,0);
      trendData.push({ label: shortDate(ds), inc, exp });
    }
  } else if(trendGranularity==='year'){
    const curYear = parseInt(todayStr().slice(0,4),10);
    for(let y=curYear-3; y<=curYear; y++){
      const ys = String(y);
      const inc = incomes.filter(e=>e.date.slice(0,4)===ys).reduce((s,e)=>s+e.amount,0);
      const exp = expenses.filter(e=>e.date.slice(0,4)===ys).reduce((s,e)=>s+e.amount,0);
      trendData.push({ label: ys, inc, exp });
    }
  } else {
    const trendMonths = [];
    let tm = viewMonth;
    for(let i=0;i<6;i++){ trendMonths.unshift(tm); tm = shiftMonth(tm,-1); }
    trendData = trendMonths.map(ym=>{
      const inc = incomes.filter(e=>monthOf(e.date)===ym).reduce((s,e)=>s+e.amount,0);
      const exp = expenses.filter(e=>monthOf(e.date)===ym).reduce((s,e)=>s+e.amount,0);
      return { label: monthLabel(ym).split(' ')[0].slice(0,3), inc, exp };
    });
  }
  const trendMax = Math.max(1, ...trendData.map(d=>Math.max(d.inc,d.exp)));

  const trendBox = `
    <div class="tb-section-title" style="margin-top:16px">Доходы и расходы</div>
    <div class="subtabs" style="margin-bottom:10px">
      <div class="subtab ${trendGranularity==='day'?'active':''}" id="trendDay">Дни</div>
      <div class="subtab ${trendGranularity==='month'?'active':''}" id="trendMonth">Месяцы</div>
      <div class="subtab ${trendGranularity==='year'?'active':''}" id="trendYear">Годы</div>
    </div>
    ${trendData.map(d=>`
      <div class="trend-row">
        <span class="trend-month">${d.label}</span>
        <div class="trend-bars">
          <div class="trend-bar-track"><div class="trend-bar income" style="width:${(d.inc/trendMax*100).toFixed(0)}%"></div></div>
          <div class="trend-bar-track"><div class="trend-bar expense" style="width:${(d.exp/trendMax*100).toFixed(0)}%"></div></div>
        </div>
      </div>
    `).join('')}
  `;

  const recurringSum = monthExp.filter(e=>e.recurring==='Регулярный').reduce((s,e)=>s+e.amount,0);
  const forecastBox = recurringSum>0 ? `
    <div class="tb-section-title" style="margin-top:16px">Прогноз на следующий месяц</div>
    <div class="row2"><span>По регулярным тратам</span><span>~${fmt(recurringSum)} ₽</span></div>
  ` : '';

  const donutHtml = expSorted.length ? buildDonut(expSorted) : '';

  const typeMap = {};
  monthExp.forEach(e=>{ const t=e.expType||'Необходимые'; typeMap[t]=(typeMap[t]||0)+e.amount; });
  const typeBox = totalExp>0 ? `
    <div class="tb-section-title" style="margin-top:16px">По типу трат</div>
    ${EXPENSE_TYPES.map(t=>{
      const val = typeMap[t]||0;
      const pct = totalExp? (val/totalExp*100) : 0;
      return `
        <div class="bd-row">
          <span class="bd-label">${t}</span>
          <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${pct.toFixed(0)}%"></span></span>
          <span class="bd-amount">${pct.toFixed(0)}%</span>
        </div>`;
    }).join('')}
  ` : '';

  const limitEntries = Object.entries(categoryLimits);
  const categoryLimitsBox = `
    <div class="tb-section-title" style="margin-top:16px">Лимиты по категориям</div>
    ${limitEntries.length===0? '<div class="empty" style="padding:6px 0">Лимиты не заданы</div>' : limitEntries.map(([cat,lim])=>{
      const spent = expByCat[cat]||0;
      const pct = lim>0? Math.min(100,(spent/lim*100)) : 0;
      const over = spent>lim;
      return `
        <div class="bd-row">
          <span class="bd-label">${cat}</span>
          <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${pct.toFixed(0)}%;background:${over?'var(--rust)':'var(--copper)'}"></span></span>
          <span class="bd-amount" style="${over?'color:var(--rust)':''}">${fmt(spent)}/${fmt(lim)} ₽</span>
        </div>`;
    }).join('')}
    <div class="row" style="gap:6px;margin-top:8px">
      <select id="limCategory" style="flex:1;font-size:12px;padding:6px;border:1px solid var(--line);border-radius:6px;">${CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select>
      <input type="number" id="limAmount" placeholder="лимит, ₽" style="width:90px;font-size:12px;padding:6px;border:1px solid var(--line);border-radius:6px;">
      <button type="button" id="limSaveBtn" class="buy-btn">Задать</button>
    </div>
  `;

  const totalsBox = `
    <div class="totals-box">
      <div class="tb-title">Итого за ${monthLabel(viewMonth)}</div>
      <div class="tb-section-title">Расходы — ${fmt(totalExp)} ₽</div>
      ${donutHtml}
      ${expSorted.length? expSorted.map(([cat,val],i)=>`
        <div class="bd-row ${i===0?'top':''}">
          <span class="bd-label">${cat}</span>
          <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${maxExp?(val/maxExp*100).toFixed(0):0}%"></span></span>
          <span class="bd-amount">${fmt(val)} ₽</span>
        </div>`).join('') : '<div class="empty" style="padding:8px 0">Нет расходов</div>'}
      ${typeBox}
      ${categoryLimitsBox}
      <div class="tb-section-title">Доходы — ${fmt(totalInc)} ₽</div>
      ${incSorted.length? incSorted.map(([cat,val],i)=>`
        <div class="bd-row">
          <span class="bd-label">${cat}</span>
          <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${maxInc?(val/maxInc*100).toFixed(0):0}%;background:var(--forest)"></span></span>
          <span class="bd-amount" style="color:var(--forest)">${fmt(val)} ₽</span>
        </div>`).join('') : '<div class="empty" style="padding:8px 0">Нет доходов</div>'}
      <div class="totals" style="margin-top:12px">
        <div class="row2 total"><span>Баланс месяца</span><span class="${(totalInc-totalExp)<0?'neg':'pos'}">${(totalInc-totalExp)>=0?'+':''}${fmt(totalInc-totalExp)} ₽</span></div>
      </div>
      ${forecastBox}
      ${trendBox}
      <div class="tb-section-title" style="margin-top:16px">Совет от ИИ</div>
    </div>
  `;

  let body = '';
  if(financeSub==='expenses'){
    let rowsHtml = monthExp.length===0
      ? '<div class="empty">Нет расходов за этот месяц.</div>'
      : monthExp.map(e=>`
        <div class="row-entry">
          <div class="row">
            <span class="date">${shortDate(e.date)}</span>
            <span class="desc">
              <span class="cat">${e.category}</span>
              ${e.place? `<span class="place">${e.place}</span>`:''}
              ${e.note? `<span class="note">${e.note}</span>`:''}
            </span>
            <span class="leader"></span>
            <span class="amount">${fmt(e.amount)} ₽</span>
            <button class="del" data-del-exp="${e.id}" aria-label="Удалить">×</button>
          </div>
          <div class="row-meta">
            ${e.person? `<span class="tag person">${e.person}</span>`:''}
            ${e.accountId? (()=>{ const a=accounts.find(x=>x.id===e.accountId); return a? `<span class="tag">${a.owner} · ${a.bank}</span>`:''; })():''}
            ${e.creditId? (()=>{ const c=credits.find(x=>x.id===e.creditId); return c? `<span class="tag" style="color:var(--rust)">Кредит: ${c.name}</span>`:''; })():''}
            ${e.expType? `<span class="tag">${e.expType}</span>`:''}
            ${(e.tags&&e.tags.length)? e.tags.map(t=>`<span class="tag" style="color:var(--copper)">#${t}</span>`).join(''):''}
            ${e.paymentMethod? `<span class="tag">${e.paymentMethod}</span>`:''}
            ${e.recurring==='Регулярный'? `<span class="tag recurring">Регулярный</span>`:''}
          </div>
        </div>`).join('');

    body = `
      <form class="add" id="addForm">
        <div class="full"><label>Сумма, ₽</label><input type="number" id="amount" step="0.01" min="0" required></div>
        <div><label>Категория</label><select id="category">${CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div><label>Дата</label><input type="date" id="date" value="${todayStr()}"></div>
        <div><label>Тип траты</label><select id="expType">${EXPENSE_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div class="full"><label>Счёт</label><select id="expAccount">
          <option value="">Без привязки к счёту</option>
          ${accounts.map(a=>`<option value="${a.id}">${a.owner} · ${a.bank}</option>`).join('')}
        </select></div>
        ${credits.length? `<div class="full"><label>Платёж по кредиту (если применимо)</label><select id="expCredit">
          <option value="">Не связано с кредитом</option>
          ${credits.map(c=>`<option value="${c.id}">${c.person} · ${c.name}</option>`).join('')}
        </select></div>` : ''}
        <div><label>Место/магазин</label><input type="text" id="place" placeholder="напр., Пятёрочка"></div>
        <div><label>Способ оплаты</label><select id="paymentMethod"><option>Карта</option><option>Наличные</option></select></div>
        <div class="full"><label>Периодичность</label><select id="recurring"><option>Разовый</option><option>Регулярный</option></select></div>
        <div class="full"><label>Заметка</label><input type="text" id="note" placeholder="необязательно"></div>
        <div class="full"><label>Теги (через запятую)</label><input type="text" id="expTags" placeholder="напр., отпуск, ремонт"></div>
        <button type="submit" class="submit">Добавить расход</button>
      </form>
      <div class="list">${rowsHtml}</div>
    `;
  } else if(financeSub==='income'){
    let rowsHtml = monthInc.length===0
      ? '<div class="empty">Нет доходов за этот месяц.</div>'
      : monthInc.map(e=>`
        <div class="row-entry">
          <div class="row">
            <span class="date">${shortDate(e.date)}</span>
            <span class="desc">
              <span class="cat">${e.category}</span>
              ${e.note? `<span class="note">${e.note}</span>`:''}
            </span>
            <span class="leader"></span>
            <span class="amount" style="color:var(--forest)">+${fmt(e.amount)} ₽</span>
            <button class="del" data-del-inc="${e.id}" aria-label="Удалить">×</button>
          </div>
          <div class="row-meta">
            ${e.person? `<span class="tag person">${e.person}</span>`:''}
            ${e.accountId? (()=>{ const a=accounts.find(x=>x.id===e.accountId); return a? `<span class="tag">${a.owner} · ${a.bank}</span>`:''; })():''}
          </div>
        </div>`).join('');

    body = `
      <form class="add" id="incomeForm">
        <div class="full"><label>Сумма, ₽</label><input type="number" id="iAmount" step="0.01" min="0" required></div>
        <div><label>Категория</label><select id="iCategory">${INCOME_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
        <div><label>Дата</label><input type="date" id="iDate" value="${todayStr()}"></div>
        <div class="full"><label>Счёт</label><select id="incAccount">
          <option value="">Без привязки к счёту</option>
          ${accounts.map(a=>`<option value="${a.id}">${a.owner} · ${a.bank}</option>`).join('')}
        </select></div>
        <div class="full"><label>Заметка</label><input type="text" id="iNote" placeholder="напр., аванс"></div>
        <button type="submit" class="submit">Добавить доход</button>
      </form>
      <div class="list">${rowsHtml}</div>
      ${renderExpectedIncomes()}
    `;
  } else if(financeSub==='credits'){
    const activeCredits = credits.filter(c=>creditRemaining(c)>0);
    const sorted = [...activeCredits].sort((a,b)=>{
      if(debtStrategy==='avalanche') return (b.rate||0)-(a.rate||0);
      return creditRemaining(a)-creditRemaining(b);
    });
    const priorityId = sorted.length? sorted[0].id : null;

    body = `
      <div class="subtabs" style="margin-bottom:12px">
        <div class="subtab ${debtStrategy==='avalanche'?'active':''}" id="strAvalanche">Лавина (по ставке)</div>
        <div class="subtab ${debtStrategy==='snowball'?'active':''}" id="strSnowball">Снежный ком (по сумме)</div>
      </div>
      <form class="add" id="creditForm">
        <div class="full"><label>Новое кредитное обязательство</label></div>
        <div><label>Владелец</label><select id="crPerson">${PEOPLE.map(p=>`<option>${p}</option>`).join('')}</select></div>
        <div><label>Тип</label><select id="crType"><option>Кредит</option><option>Ипотека</option><option>Кредитная карта</option></select></div>
        <div class="full"><label>Название</label><input type="text" id="crName" placeholder="напр., Кредитка Тбанк"></div>
        <div><label>Сумма долга, ₽</label><input type="number" id="crTotal" step="0.01" min="0"></div>
        <div><label>Ставка, %</label><input type="number" id="crRate" step="0.01" min="0"></div>
        <div><label>Платёж/мес, ₽</label><input type="number" id="crPayment" step="0.01" min="0"></div>
        <div><label>День платежа</label><input type="number" id="crDay" min="1" max="31" value="1"></div>
        <button type="submit" class="submit">Добавить кредит</button>
      </form>
      ${credits.length===0? '<div class="empty">Кредитных обязательств нет.</div>' : credits.map(c=>{
        const remaining = creditRemaining(c);
        const paidThisMonth = creditPaidThisMonth(c);
        const isPriority = c.id===priorityId;
        return `
          <div class="row-entry">
            <div class="row">
              <span class="desc">
                <span class="cat">${c.name}</span>
                <span class="place">${c.creditType||'Кредит'} · ${c.person} · ставка ${c.rate!=null?c.rate:'—'}% · платёж ${c.paymentDay} числа</span>
              </span>
              <span class="leader"></span>
              <span class="amount">${fmt(remaining)} ₽</span>
              <button class="del" data-del-credit="${c.id}" aria-label="Удалить">×</button>
            </div>
            <div class="row-meta">
              ${isPriority? '<span class="tag" style="color:var(--copper);font-weight:600">★ Гасить первым</span>' : ''}
              ${paidThisMonth? '<span class="tag" style="color:var(--forest)">Оплачено в этом месяце</span>' : `<button class="buy-btn" data-pay-credit="${c.id}">Списать платёж ${fmt(c.monthlyPayment)} ₽</button>`}
            </div>
          </div>`;
      }).join('')}
      ${credits.length? `<div class="totals"><div class="row2 total"><span>Общий остаток долга</span><span class="neg">${fmt(credits.reduce((s,c)=>s+creditRemaining(c),0))} ₽</span></div></div>` : ''}
    `;
  } else {
    const totalGoalTarget = goals.reduce((s,g)=>s+(g.target||0),0);
    const totalGoalSaved = goals.reduce((s,g)=>s+(g.saved||0),0);
    body = `
      ${goals.length===0? '<div class="empty">Пока нет целей — добавьте во вкладке «Цели».</div>' : goals.map(g=>{
        const pct = g.target>0 ? Math.min(100,(g.saved/g.target*100)) : 0;
        return `
          <div class="bd-row">
            <span class="bd-label">${g.name}</span>
            <span class="bd-bar-track"><span class="bd-bar-fill" style="width:${pct.toFixed(0)}%;background:var(--copper)"></span></span>
            <span class="bd-amount">${pct.toFixed(0)}%</span>
          </div>`;
      }).join('')}
      ${goals.length? `<div class="totals" style="margin-top:12px">
        <div class="row2"><span>Всего накоплено</span><span class="pos">${fmt(totalGoalSaved)} ₽</span></div>
        <div class="row2 total"><span>Общая цель</span><span>${fmt(totalGoalTarget)} ₽</span></div>
      </div>` : ''}
    `;
  }

  return monthNav + subtabs + body + ((financeSub==='expenses'||financeSub==='income') ? totalsBox : '');
}

/* ============ РЕНДЕР: СПИСОК ПОКУПОК ============ */
function renderShoppingTab(){
  const me = getDevicePerson();
  const boughtSum = shopping.filter(s=>s.bought && s.price).reduce((sum,s)=>sum+(s.qty||1)*s.price,0);
  const boughtCount = shopping.filter(s=>s.bought).length;

  const grouped = {};
  shopping.forEach(s=>{ (grouped[s.category] = grouped[s.category]||[]).push(s); });

  let listHtml='';
  if(shopping.length===0){
    listHtml = '<div class="empty">Список пуст. Добавьте товары ниже.</div>';
  } else {
    listHtml = Object.entries(grouped).map(([cat,items])=>`
      <div class="date-header">${cat}</div>
      ${items.map(s=>{
        const qty = s.qty||1;
        const lineTotal = qty*(s.price||0);
        const canDelete = s.person===me;
        return `
        <div class="shop-row">
          <div class="shop-item ${s.bought?'bought':'notbought'}" data-toggle="${s.id}">
            <div class="shop-check">${s.bought?'✓':''}</div>
            <div class="shop-main">
              <div class="shop-name-row">
                <span class="shop-name">${s.name}</span>
                <button class="shop-edit no-toggle" data-edit="${s.id}" aria-label="Переименовать">✎</button>
              </div>
              <span class="shop-cat">${s.person||''}</span>
            </div>
            <div class="shop-controls no-toggle">
              <div class="qty-stepper">
                <button data-qty-minus="${s.id}" aria-label="Меньше">–</button>
                <span class="qty-val">${qty}</span>
                <button data-qty-plus="${s.id}" aria-label="Больше">+</button>
              </div>
              <input class="shop-price-input" type="number" inputmode="decimal" placeholder="цена/шт" value="${s.price!=null?s.price:''}" data-price="${s.id}">
              ${qty>1 && s.price? `<span class="shop-line-total">${fmt(lineTotal)} ₽</span>`:''}
            </div>
          </div>
          ${canDelete? `<button class="shop-del-tile" data-del-shop="${s.id}" aria-label="Удалить">×</button>` : ''}
        </div>
      `;}).join('')}
    `).join('');
  }

  const historyChips = shopHistory.length ? `
    <div class="tb-section-title">Из истории</div>
    <div class="chips">
      ${shopHistory.map(h=>`
        <span class="chip">
          <button type="button" class="chip-add" data-quick-add="${h.name}" data-quick-cat="${h.category}">${h.name}</button>
          <button type="button" class="chip-del" data-del-history="${h.name}" aria-label="Удалить из истории">×</button>
        </span>
      `).join('')}
    </div>
  ` : '';

  return `
    <form class="add" id="shopForm">
      <div class="full"><label>Что купить</label>
        <input type="text" id="sName" list="shopHistoryList" placeholder="напр., молоко" required autocomplete="off">
        <datalist id="shopHistoryList">${shopHistory.map(h=>`<option value="${h.name}">`).join('')}</datalist>
      </div>
      <div><label>Категория</label><select id="sCategory">${SHOP_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Количество</label>
        <div class="qty-stepper" style="width:100%">
          <button type="button" id="sQtyMinus" aria-label="Меньше">–</button>
          <span class="qty-val" id="sQtyVal">1</span>
          <button type="button" id="sQtyPlus" aria-label="Больше">+</button>
        </div>
        <input type="hidden" id="sQty" value="1">
      </div>
      <button type="submit" class="submit">Добавить в список</button>
    </form>
    ${historyChips}
    ${lastShoppingList.length? `<button class="reset" id="restoreLastList" style="margin-bottom:14px">Добавить прошлый список (${lastShoppingList.length})</button>` : ''}
    <div class="list">${listHtml}</div>
    <div class="totals">
      <div class="row2"><span>Куплено позиций</span><span>${boughtCount} из ${shopping.length}</span></div>
      <div class="row2 total"><span>Потрачено (куплено)</span><span>${fmt(boughtSum)} ₽</span></div>
    </div>
    ${boughtCount>0? '<button class="reset" id="clearBought">Убрать купленные из списка</button>':''}
  `;
}

function renderHistoryTab(){
  let merged = [
    ...expenses.map(e=>({...e, kind:'exp'})),
    ...incomes.map(e=>({...e, kind:'inc'}))
  ].sort((a,b)=> a.date < b.date ? 1 : a.date > b.date ? -1 : 0);

  if(histFilterPerson){
    merged = merged.filter(r=>r.person===histFilterPerson);
  }
  if(histFilterCategory){
    merged = merged.filter(r=>r.category===histFilterCategory);
  }
  if(histFilterText.trim()){
    const q = histFilterText.trim().toLowerCase();
    merged = merged.filter(r=>{
      const inNote = r.note && r.note.toLowerCase().includes(q);
      const inTags = r.tags && r.tags.some(t=>t.toLowerCase().includes(q));
      const inCat = r.category && r.category.toLowerCase().includes(q);
      return inNote || inTags || inCat;
    });
  }

  const allCats = [...new Set([...expenses.map(e=>e.category), ...incomes.map(e=>e.category)])];

  const filterHtml = `
    <form class="add" id="histFilterForm" style="margin-bottom:14px">
      <div class="full"><label>Поиск (заметка, тег, категория)</label><input type="text" id="histText" placeholder="напр., отпуск" value="${histFilterText}"></div>
      <div><label>Кто</label><select id="histPerson">
        <option value="">Все</option>
        ${PEOPLE.map(p=>`<option value="${p}" ${histFilterPerson===p?'selected':''}>${p}</option>`).join('')}
      </select></div>
      <div><label>Категория</label><select id="histCategory">
        <option value="">Все</option>
        ${allCats.map(c=>`<option value="${c}" ${histFilterCategory===c?'selected':''}>${c}</option>`).join('')}
      </select></div>
    </form>
  `;

  if(merged.length===0){
    return filterHtml + '<div class="empty">Ничего не найдено.</div>';
  }

  let lastLabel = null;
  const listHtml = merged.map(r=>{
    const label = dateLabel(r.date);
    const headerHtml = label!==lastLabel ? `<div class="date-header">${label}</div>` : '';
    lastLabel = label;
    const isExp = r.kind==='exp';
    return `
      ${headerHtml}
      <div class="row-entry">
        <div class="row">
          <span class="date">${shortDate(r.date)}</span>
          <span class="desc">
            <span class="cat">${r.category}</span>
            ${r.note? `<span class="note">${r.note}</span>`:''}
          </span>
          <span class="leader"></span>
          <span class="amount" style="color:${isExp?'var(--rust)':'var(--forest)'}">${isExp?'−':'+'}${fmt(r.amount)} ₽</span>
          <button class="del" data-hist-del="${r.kind}:${r.id}" aria-label="Удалить">×</button>
        </div>
        <div class="row-meta">
          ${r.person? `<span class="tag person">${r.person}</span>`:''}
          ${isExp && r.expType? `<span class="tag">${r.expType}</span>`:''}
          ${(isExp && r.tags && r.tags.length)? r.tags.map(t=>`<span class="tag" style="color:var(--copper)">#${t}</span>`).join(''):''}
        </div>
      </div>
    `;
  }).join('');

  const totalExpAll = merged.filter(r=>r.kind==='exp').reduce((s,e)=>s+e.amount,0);
  const totalIncAll = merged.filter(r=>r.kind==='inc').reduce((s,e)=>s+e.amount,0);

  return filterHtml + `
    <div class="list">${listHtml}</div>
    <div class="totals">
      <div class="row2"><span>Всего доходов</span><span class="pos">+${fmt(totalIncAll)} ₽</span></div>
      <div class="row2 total"><span>Всего расходов</span><span class="neg">−${fmt(totalExpAll)} ₽</span></div>
    </div>
  `;
}

function renderGoalsTab(){
  let listHtml='';
  if(goals.length===0){
    listHtml = '<div class="empty">Пока нет финансовых целей 🎯</div>';
  } else {
    listHtml = goals.map(g=>{
      const pct = g.target>0 ? Math.min(100, (g.saved/g.target*100)) : 0;
      const done = g.saved>=g.target && g.target>0;
      const left = Math.max(0, g.target - g.saved);
      return `
        <div class="wish">
          <div class="wish-head">
            <span class="wish-name">${g.name}</span>
            <span class="wish-price">${fmt(g.target)} ₽</span>
            <button class="wish-del" data-del-goal="${g.id}" aria-label="Удалить">×</button>
          </div>
          <div class="wish-progress-track"><span class="wish-progress-fill ${done?'done':''}" style="width:${pct}%"></span></div>
          <div class="wish-info">
            <span class="wish-saved">Накоплено: ${fmt(g.saved||0)} ₽ (${pct.toFixed(0)}%)</span>
            <span>${done? '' : 'осталось '+fmt(left)+' ₽'}</span>
          </div>
          ${done? '<div class="wish-done-badge">✓ Цель достигнута!</div>' : `
            <div class="wish-add-row">
              <input type="number" inputmode="decimal" placeholder="отложить сумму" data-goal-input="${g.id}">
              <button data-goal-add="${g.id}">Отложить</button>
            </div>`}
          ${g.person? `<div style="margin-top:6px"><span class="tag person">${g.person}</span></div>`:''}
        </div>`;
    }).join('');
  }

  const totalTarget = goals.reduce((s,g)=>s+(g.target||0),0);
  const totalSaved = goals.reduce((s,g)=>s+(g.saved||0),0);

  return `
    <form class="add" id="goalForm">
      <div class="full"><label>Финансовая цель</label><input type="text" id="gName" placeholder="напр., подушка безопасности" required></div>
      <div><label>Цель, ₽</label><input type="number" id="gTarget" step="0.01" min="0" required></div>
      <button type="submit" class="submit">Добавить цель</button>
    </form>
    <div class="list">${listHtml}</div>
    ${goals.length? `<div class="totals">
      <div class="row2"><span>Всего накоплено</span><span class="pos">${fmt(totalSaved)} ₽</span></div>
      <div class="row2 total"><span>Общая цель</span><span>${fmt(totalTarget)} ₽</span></div>
    </div>`:''}
  `;
}
function renderExpectedIncomes(){
  let listHtml='';
  if(planned.length===0){
    listHtml = '<div class="empty">Пока нет ожидаемых доходов.</div>';
  } else {
    let lastLabel = null;
    listHtml = planned.map(p=>{
      const label = dateLabel(p.date);
      const headerHtml = label!==lastLabel ? `<div class="date-header">${label}</div>` : '';
      lastLabel = label;
      return `
        ${headerHtml}
        <div class="row-entry">
          <div class="row">
            <span class="desc" style="max-width:48%">
              <span class="cat">${p.category}</span>
              ${p.note? `<span class="note">${p.note}</span>`:''}
            </span>
            <span class="leader"></span>
            <span class="amount" style="color:var(--forest)">+${fmt(p.amount)} ₽</span>
            <button class="del" data-del-expinc="${p.id}" aria-label="Удалить">×</button>
          </div>
          <div class="row-meta">
            ${p.person? `<span class="tag person">${p.person}</span>`:''}
            <button class="buy-btn" data-confirm-expinc="${p.id}">Получено → в доходы</button>
          </div>
        </div>
      `;
    }).join('');
  }

  const totalExpected = planned.reduce((s,p)=>s+p.amount,0);

  return `
    <div class="tb-section-title" style="margin-top:16px">Ожидаемые доходы</div>
    <form class="add" id="expIncForm">
      <div class="full"><label>Сумма, ₽</label><input type="number" id="eiAmount" step="0.01" min="0" required></div>
      <div><label>Категория</label><select id="eiCategory">${INCOME_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Дата</label><input type="date" id="eiDate" value="${tomorrowStr()}"></div>
      <div class="full"><label>Заметка</label><input type="text" id="eiNote" placeholder="напр., аванс за март"></div>
      <button type="submit" class="submit">Запланировать доход</button>
    </form>
    <div class="list">${listHtml}</div>
    ${planned.length? `<div class="totals">
      <div class="row2 total"><span>Всего ожидается</span><span class="pos">${fmt(totalExpected)} ₽</span></div>
    </div>`:''}
  `;
}

/* ============ ГЛАВНЫЙ РЕНДЕР ============ */
function render(){
  const card = document.getElementById('card');
  if(firstLoad){ card.innerHTML = '<div class="loading">Подключение к базе данных…</div>'; return; }

  const totalExpAll = expenses.reduce((s,e)=>s+e.amount,0);
  const totalIncAll = incomes.reduce((s,e)=>s+e.amount,0);
  const balance = totalIncAll - totalExpAll;

  const paceYm = todayStr().slice(0,7);
  const paceExp = expenses.filter(e=>monthOf(e.date)===paceYm).reduce((s,e)=>s+e.amount,0);
  const paceInc = incomes.filter(e=>monthOf(e.date)===paceYm).reduce((s,e)=>s+e.amount,0);
  const paceDaysInMonth = new Date(parseInt(paceYm.slice(0,4)), parseInt(paceYm.slice(5,7)), 0).getDate();
  const paceDayNow = parseInt(todayStr().slice(8,10),10);
  const paceDaysLeft = Math.max(1, paceDaysInMonth - paceDayNow + 1);
  const paceSuggested = Math.max(0, (paceInc - paceExp) / paceDaysLeft);

  let content = '';
  if(activeTab==='home') content = renderHomeTab();
  else if(activeTab==='finance') content = renderFinanceTab();
  else if(activeTab==='shopping') content = renderShoppingTab();
  else if(activeTab==='goals') content = renderGoalsTab();
  else if(activeTab==='accounts') content = renderAccountsTab();
  else content = renderHistoryTab();

  card.innerHTML = `
    <button id="enablePush" class="bell-btn" aria-label="Включить уведомления">🔔</button>
    <button id="openHistory" class="bell-btn history-btn" aria-label="История">📜</button>
    <h1>Гроссбух</h1>
    <div class="sub">семейный бюджет</div>
    <div class="sync-status ${connected?'':'offline'}">${connected?'● синхронизировано':'○ нет связи с базой'}</div>
    <div class="sync-status">Вы: <b>${getDevicePerson()}</b> · <a href="#" id="changePerson" style="color:var(--copper)">сменить</a></div>
    <div class="balance-bar">
      <span>Общий баланс</span>
      <span class="balance-val ${balance<0?'neg':'pos'}">${balance>=0?'+':''}${fmt(balance)} ₽</span>
    </div>
    <div class="limit-bar">
      <span>Лимит на сегодня</span>
      <input type="number" id="dailyLimitInput" inputmode="decimal" placeholder="не задан" value="${dailyLimit!=null?dailyLimit:''}">
    </div>
    <div class="sync-status" style="margin-top:-10px">Рекомендуем: ~${fmt(paceSuggested)} ₽/день до конца месяца</div>
    <div class="tabs">
      <button class="tab ${activeTab==='home'?'active':''}" id="tabHome">Главная</button>
      <button class="tab ${activeTab==='finance'?'active':''}" id="tabFinance">Финансы</button>
      <button class="tab ${activeTab==='shopping'?'active':''}" id="tabShopping">Покупки</button>
      <button class="tab ${activeTab==='goals'?'active':''}" id="tabGoals">Цели</button>
      <button class="tab ${activeTab==='accounts'?'active':''}" id="tabAccounts">Счета</button>
    </div>
    ${content}
  `;

  document.getElementById('enablePush').onclick = ()=>{
    const devicePerson = getDevicePerson();
    if(window.OneSignalDeferred){
      window.OneSignalDeferred.push(function(OneSignal){
        OneSignal.User.PushSubscription.optIn();
        setTimeout(()=>{ OneSignal.User.addTag('person', devicePerson); }, 1500);
      });
    }
  };
  document.getElementById('changePerson').onclick = (ev)=>{ ev.preventDefault(); changeDevicePerson(); };
  const dlGlobal = document.getElementById('dailyLimitInput');
  dlGlobal.onchange = ()=>{
    const v = parseFloat(dlGlobal.value);
    setDailyLimit(dlGlobal.value===''||isNaN(v) ? null : v);
  };

  document.getElementById('tabHome').onclick = ()=>switchTab('home');
  document.getElementById('tabFinance').onclick = ()=>switchTab('finance');
  document.getElementById('tabShopping').onclick = ()=>switchTab('shopping');
  document.getElementById('tabGoals').onclick = ()=>switchTab('goals');
  document.getElementById('tabAccounts').onclick = ()=>switchTab('accounts');
  document.getElementById('openHistory').onclick = (ev)=>{ ev.preventDefault(); switchTab('history'); };

  if(activeTab==='home'){
    // дашборд без интерактивных элементов
  } else if(activeTab==='finance'){
    document.getElementById('prevMonth').onclick = ()=>{ viewMonth = shiftMonth(viewMonth,-1); render(); };
    document.getElementById('nextMonth').onclick = ()=>{ viewMonth = shiftMonth(viewMonth,1); render(); };
    document.getElementById('subExp').onclick = ()=>switchSub('expenses');
    document.getElementById('subInc').onclick = ()=>switchSub('income');
    document.getElementById('subCredits').onclick = ()=>switchSub('credits');
    document.getElementById('subSavings').onclick = ()=>switchSub('savings');
    const tDay = document.getElementById('trendDay');
    const tMonth = document.getElementById('trendMonth');
    const tYear = document.getElementById('trendYear');
    if(tDay) tDay.onclick = ()=>{ trendGranularity='day'; render(); };
    if(tMonth) tMonth.onclick = ()=>{ trendGranularity='month'; render(); };
    if(tYear) tYear.onclick = ()=>{ trendGranularity='year'; render(); };
    card.querySelectorAll('[data-del-credit]').forEach(b=> b.onclick=()=>deleteCredit(b.getAttribute('data-del-credit')));
    card.querySelectorAll('[data-pay-credit]').forEach(b=> b.onclick=()=>payCreditNow(b.getAttribute('data-pay-credit')));
    const limBtn = document.getElementById('limSaveBtn');
    if(limBtn) limBtn.onclick = ()=>{
      const cat = document.getElementById('limCategory').value;
      const val = parseFloat(document.getElementById('limAmount').value);
      if(!val || val<=0) return;
      setCategoryLimit(cat, val);
    };
    const strA = document.getElementById('strAvalanche');
    const strS = document.getElementById('strSnowball');
    if(strA) strA.onclick = ()=>{ debtStrategy='avalanche'; render(); };
    if(strS) strS.onclick = ()=>{ debtStrategy='snowball'; render(); };

    if(financeSub==='expenses'){
      const f = document.getElementById('addForm');
      f.onsubmit = (ev)=>{
        ev.preventDefault();
        const amount = parseFloat(document.getElementById('amount').value);
        if(!amount || amount<=0) return;
        addExpense(amount,
          document.getElementById('category').value,
          document.getElementById('note').value.trim(),
          document.getElementById('date').value || todayStr(),
          document.getElementById('place').value.trim(),
          document.getElementById('paymentMethod').value,
          document.getElementById('recurring').value,
          getDevicePerson(),
          document.getElementById('expAccount').value || null,
          document.getElementById('expType').value,
          (document.getElementById('expCredit')? document.getElementById('expCredit').value : '') || null,
          document.getElementById('expTags').value.split(',').map(t=>t.trim()).filter(Boolean));
      };
      card.querySelectorAll('[data-del-exp]').forEach(b=> b.onclick=()=>deleteExpense(b.getAttribute('data-del-exp')));
    } else if(financeSub==='income'){
      const f = document.getElementById('incomeForm');
      f.onsubmit = (ev)=>{
        ev.preventDefault();
        const amount = parseFloat(document.getElementById('iAmount').value);
        if(!amount || amount<=0) return;
        addIncome(amount,
          document.getElementById('iCategory').value,
          document.getElementById('iNote').value.trim(),
          document.getElementById('iDate').value || todayStr(),
          getDevicePerson(),
          document.getElementById('incAccount').value || null);
      };
      card.querySelectorAll('[data-del-inc]').forEach(b=> b.onclick=()=>deleteIncome(b.getAttribute('data-del-inc')));
      const eiForm = document.getElementById('expIncForm');
      if(eiForm) eiForm.onsubmit = (ev)=>{
        ev.preventDefault();
        const amount = parseFloat(document.getElementById('eiAmount').value);
        if(!amount || amount<=0) return;
        addExpectedIncome(amount,
          document.getElementById('eiCategory').value,
          document.getElementById('eiDate').value || tomorrowStr(),
          document.getElementById('eiNote').value.trim(),
          getDevicePerson());
      };
      card.querySelectorAll('[data-del-expinc]').forEach(b=> b.onclick=()=>deleteExpectedIncome(b.getAttribute('data-del-expinc')));
      card.querySelectorAll('[data-confirm-expinc]').forEach(b=> b.onclick=()=>confirmExpectedIncome(b.getAttribute('data-confirm-expinc')));
    } else if(financeSub==='credits'){
      const crForm = document.getElementById('creditForm');
      crForm.onsubmit = (ev)=>{
        ev.preventDefault();
        const name = document.getElementById('crName').value.trim();
        const total = parseFloat(document.getElementById('crTotal').value);
        const rate = parseFloat(document.getElementById('crRate').value);
        const payment = parseFloat(document.getElementById('crPayment').value);
        const day = parseInt(document.getElementById('crDay').value,10) || 1;
        if(!name || isNaN(total) || isNaN(payment)) return;
        addCredit(document.getElementById('crPerson').value, name, document.getElementById('crType').value, total, isNaN(rate)?null:rate, payment, day);
      };
    }
  } else if(activeTab==='shopping'){
    document.getElementById('shopForm').onsubmit = (ev)=>{
      ev.preventDefault();
      const name = document.getElementById('sName').value.trim();
      if(!name) return;
      const qty = parseInt(document.getElementById('sQty').value,10) || 1;
      addShopItem(name, document.getElementById('sCategory').value, getDevicePerson(), qty);
      document.getElementById('sQty').value = '1';
    };
    const qtyValEl = document.getElementById('sQtyVal');
    const qtyInputEl = document.getElementById('sQty');
    document.getElementById('sQtyMinus').onclick = ()=>{
      const v = Math.max(1, parseInt(qtyInputEl.value,10)-1);
      qtyInputEl.value = v; qtyValEl.textContent = v;
    };
    document.getElementById('sQtyPlus').onclick = ()=>{
      const v = parseInt(qtyInputEl.value,10)+1;
      qtyInputEl.value = v; qtyValEl.textContent = v;
    };
    card.querySelectorAll('[data-quick-add]').forEach(b=>{
      b.onclick = ()=> addShopItem(b.getAttribute('data-quick-add'), b.getAttribute('data-quick-cat'), getDevicePerson(), 1);
    });
    card.querySelectorAll('[data-del-history]').forEach(b=>{
      b.onclick = ()=> deleteShopHistoryItem(b.getAttribute('data-del-history'));
    });
    card.querySelectorAll('.shop-item').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        if(ev.target.closest('.no-toggle')) return;
        toggleBought(el.getAttribute('data-toggle'));
      });
    });
    card.querySelectorAll('[data-del-shop]').forEach(b=> b.onclick=()=>deleteShopItem(b.getAttribute('data-del-shop')));
    card.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>renameShopItem(b.getAttribute('data-edit')));
    card.querySelectorAll('[data-qty-minus]').forEach(b=> b.onclick=()=>changeShopQty(b.getAttribute('data-qty-minus'), -1));
    card.querySelectorAll('[data-qty-plus]').forEach(b=> b.onclick=()=>changeShopQty(b.getAttribute('data-qty-plus'), 1));
    card.querySelectorAll('[data-price]').forEach(inp=>{
      inp.onchange = ()=>{
        const v = parseFloat(inp.value);
        setShopPrice(inp.getAttribute('data-price'), isNaN(v)? null : v);
      };
    });
    const cb = document.getElementById('clearBought');
    if(cb) cb.onclick = clearBoughtShop;
    const rl = document.getElementById('restoreLastList');
    if(rl) rl.onclick = restoreLastShoppingList;
  } else if(activeTab==='goals'){
    document.getElementById('goalForm').onsubmit = (ev)=>{
      ev.preventDefault();
      const name = document.getElementById('gName').value.trim();
      const target = parseFloat(document.getElementById('gTarget').value);
      if(!name || !target || target<=0) return;
      addGoal(name, target, getDevicePerson());
    };
    card.querySelectorAll('[data-del-goal]').forEach(b=> b.onclick=()=>deleteGoal(b.getAttribute('data-del-goal')));
    card.querySelectorAll('[data-goal-add]').forEach(b=>{
      b.onclick = ()=>{
        const id = b.getAttribute('data-goal-add');
        const inp = card.querySelector(`[data-goal-input="${id}"]`);
        const v = parseFloat(inp.value);
        if(!v || v<=0) return;
        addToGoal(id, v);
      };
    });
  } else if(activeTab==='accounts'){
    card.querySelectorAll('[data-del-account]').forEach(b=> b.onclick=()=>deleteAccount(b.getAttribute('data-del-account')));
    document.getElementById('accountForm').onsubmit = (ev)=>{
      ev.preventDefault();
      const owner = document.getElementById('accOwner').value;
      const bank = document.getElementById('accBank').value.trim();
      const balance = parseFloat(document.getElementById('accBalance').value);
      if(!bank || isNaN(balance)) return;
      addAccount(owner, bank, balance);
    };
  } else {
    card.querySelectorAll('[data-hist-del]').forEach(b=>{
      b.onclick = ()=>{
        const [kind, id] = b.getAttribute('data-hist-del').split(':');
        if(kind==='exp') deleteExpense(id); else deleteIncome(id);
      };
    });
    const hText = document.getElementById('histText');
    const hPerson = document.getElementById('histPerson');
    const hCategory = document.getElementById('histCategory');
    const hForm = document.getElementById('histFilterForm');
    if(hForm) hForm.onsubmit = (ev)=> ev.preventDefault();
    if(hText) hText.onchange = ()=>{ histFilterText = hText.value; render(); };
    if(hPerson) hPerson.onchange = ()=>{ histFilterPerson = hPerson.value; render(); };
    if(hCategory) hCategory.onchange = ()=>{ histFilterCategory = hCategory.value; render(); };
  }
}
</script>
</body>
</html>
