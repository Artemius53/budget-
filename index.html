<style>
  :root{
    --bg: #DEE3D6;
    --paper: #EEF1E9;
    --line: #C9CFC0;
    --ink: #1C2B22;
    --ink-soft: #5B6B5F;
    --copper: #A6672C;
    --forest: #2F5233;
    --rust: #A63A2E;
  }
  *{box-sizing:border-box;}
  html{ -webkit-text-size-adjust: 100%; }
  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, rgba(28,43,34,0.06) 1px, transparent 0);
    background-size: 18px 18px;
    display:flex;
    justify-content:center;
    padding: max(24px, env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
    font-family: 'Bitter', Georgia, serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .card{
    position:relative;
    width:100%;
    max-width:440px;
    background: var(--paper);
    box-shadow: 0 24px 48px rgba(28,43,34,0.16);
    padding: 34px 26px 26px;
  }
  .card::before, .card::after{
    content:'';
    position:absolute;
    left:0; right:0;
    height:14px;
    background: radial-gradient(circle at 10px 7px, var(--bg) 6px, transparent 6.5px);
    background-size: 20px 14px;
  }
  .card::before{ top:-1px; }
  .card::after{ bottom:-1px; }

  h1{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 24px;
    text-align:center;
    margin: 4px 0 2px;
  }
  .sub{
    text-align:center;
    font-size:12px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .sync-status{
    text-align:center;
    font-size:10px;
    color: var(--forest);
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }
  .sync-status.offline{ color: var(--rust); }

  .balance-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 10px 14px;
    background: rgba(28,43,34,0.05);
    border-radius:8px;
    margin-bottom: 14px;
    font-size:13px;
    color: var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .balance-bar .balance-val{
    font-family:'IBM Plex Mono', monospace;
    font-size:17px;
    font-weight:600;
    letter-spacing:0;
  }
  .balance-bar .balance-val.pos{ color: var(--forest); }
  .balance-bar .balance-val.neg{ color: var(--rust); }

  .tabs{
    display:flex;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 18px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 12px 2px;
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    color: var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    position:relative;
    top:2px;
    -webkit-tap-highlight-color: transparent;
  }
  .tab.active{
    color: var(--ink);
    border-bottom: 2px solid var(--copper);
  }

  .month-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 16px;
  }
  .month-nav button{
    background: rgba(28,43,34,0.06);
    border:none;
    width:30px; height:30px;
    border-radius:50%;
    font-size:16px;
    color: var(--ink);
    cursor:pointer;
    flex-shrink:0;
    -webkit-tap-highlight-color: transparent;
  }
  .month-nav button:active{ background: rgba(28,43,34,0.14); }
  .month-nav .month-label{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    text-align:center;
    white-space:nowrap;
  }

  .subtabs{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .subtab{
    flex:1;

    padding:7px;
    font-size:12px;
    font-weight:600;
    border-radius:6px;

    background:#fff;
    color: var(--ink-soft);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .subtab.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .budget-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    font-size:13px;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .budget-row input{

    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    border:none;
    border-bottom:1px dashed var(--line);

    color: var(--ink);
    padding:2px 2px 4px;
  }
  .budget-row input:focus-visible{ outline: 2px solid var(--copper); outline-offset:2px; }

  form.add{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
    padding: 16px 0 18px;
    border-top: 1px dashed var(--line);
    border-bottom: 1px dashed var(--line);
    margin-bottom: 18px;
  }
  form.add .full{ grid-column: 1 / -1; }
  form.add label{
    display:block;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin-bottom:4px;
  }
  form.add input, form.add select{
    width:100%;
    font-family:'Bitter', Georgia, serif;
    font-size:16px;
    padding:10px 10px;
    border:1px solid var(--line);
    background:#fff;
    color: var(--ink);
    border-radius:6px;
  }
  form.add input[type="number"]{ font-family:'IBM Plex Mono', monospace; }
  form.add input[type="date"]{
    -webkit-appearance: none;
    appearance: none;
    height: 44px;
    line-height: 1.2;
    text-align: left;
    min-width: 0;
  }
  form.add input:focus-visible, form.add select:focus-visible{

  button.submit{

    border:none;
    padding:14px;

    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    font-size:14px;
    cursor:pointer;
    border-radius:6px;
    -webkit-tap-highlight-color: transparent;
  }
  button.submit:hover{ background: var(--forest); }
  button.submit:focus-visible{ outline:2px solid var(--copper); outline-offset:2px; }

  .list{ min-height: 40px; }
  .row{
    display:flex;
    align-items:baseline;
    gap:6px;
    padding: 9px 0;
    font-size:13px;
  }
  .row .date{

    font-size:11px;
    color: var(--ink-soft);

  .row .desc{

    flex-shrink:0;

  }
  .row .cat{ font-weight:600; }
  .row .place{ font-size:11px; color: var(--ink-soft); }
  .row .note{ font-size:11px; color: var(--ink-soft); font-style:italic; }
  .row .leader{

  .row .amount{

    font-weight:600;
    flex-shrink:0;
  }
  .row .del{
    background:none;
    border:none;
    color: var(--ink-soft);
    cursor:pointer;
    font-size:20px;
    line-height:1;
    padding:4px 4px 4px 10px;
    flex-shrink:0;
    -webkit-tap-highlight-color: transparent;
  }
  .row .del:hover, .row .del:active{ color: var(--rust); }
  .row-entry{ padding: 9px 0; }
  .row-entry + .row-entry{ border-top: 1px solid rgba(28,43,34,0.05); }
  .date-header{
    font-family:'Bitter', Georgia, serif;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--copper);
    margin-top:14px;
    padding-bottom:4px;
    border-bottom:1px solid var(--line);
  }
  .date-header:first-child{ margin-top:0; }
  .row-meta{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:6px;
    margin-top:3px;
    padding-left:48px;
  }
  .tag{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color: var(--ink-soft);
    background: rgba(28,43,34,0.06);
    border-radius:3px;
    padding:2px 6px;
  }
  .tag.recurring{ color: var(--copper); background: rgba(166,103,44,0.12); }
  .tag.person{ color: var(--forest); background: rgba(47,82,51,0.12); font-weight:600; }
  .tag.priority-high{ color: var(--rust); background: rgba(166,58,46,0.12); }
  .tag.priority-mid{ color: var(--copper); background: rgba(166,103,44,0.12); }
  .tag.priority-low{ color: var(--ink-soft); }

  .buy-btn{
    margin-left:auto;
    font-family:'Bitter', Georgia, serif;
    font-size:11px;
    color: var(--forest);
    background: rgba(47,82,51,0.1);
    border:1px solid rgba(47,82,51,0.3);
    border-radius:3px;
    padding:6px 10px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .buy-btn:hover{ background: var(--forest); color: var(--paper); }

  .breakdown{
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--line);
  }
  .breakdown-title{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin-bottom:8px;
  }
  .bd-row{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    margin-bottom:6px;
  }
  .bd-row .bd-label{ width:84px; flex-shrink:0; }
  .bd-row.top .bd-label{ color: var(--rust); font-weight:600; }
  .bd-row .bd-bar-track{
    flex:1;
    height:6px;
    background: rgba(28,43,34,0.08);
    border-radius:3px;

  .bd-row .bd-bar-fill{
    height:100%;
    background: var(--copper);
    border-radius:3px;
  }
  .bd-row.top .bd-bar-fill{ background: var(--rust); }
  .bd-row .bd-amount{
    font-family:'IBM Plex Mono', monospace;
    width:64px;
    text-align:right;
    flex-shrink:0;
  }
  .bd-row.top .bd-amount{ color: var(--rust); font-weight:600; }

  .totals-box{
    margin-top:16px;
    padding:14px;
    border:2px solid var(--ink);
    border-radius:8px;
  }
  .totals-box .tb-title{
    font-family:'Bitter', Georgia, serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-align:center;
    margin-bottom:12px;
  }
  .tb-section-title{
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color: var(--ink-soft);
    margin:10px 0 6px;
  }

  .empty{
    text-align:center;
    color: var(--ink-soft);
    font-size:13px;
    padding: 24px 0;
  }

  .totals{
    margin-top: 12px;
    padding-top: 14px;
    border-top: 2px solid var(--ink);
  }
  .totals .row2{
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    margin-bottom:4px;
  }
  .totals .row2.total{ font-weight:600; font-size:16px; }
  .totals .row2 .neg{ color: var(--rust); }
  .totals .row2 .pos{ color: var(--forest); }

  /* Список покупок */
  .shop-item{
    display:flex;
    align-items:flex-start;
    flex-wrap:wrap;
    gap:8px 10px;
    padding:11px 10px;
    border-radius:6px;
    margin-bottom:7px;
    border:1px solid var(--line);
    background:#fff;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .shop-item:active{ opacity:0.85; }
  .shop-item.bought{ background: rgba(47,82,51,0.12); border-color: rgba(47,82,51,0.4); }
  .shop-item.notbought{ background: rgba(166,58,46,0.09); border-color: rgba(166,58,46,0.35); }
  .shop-check{
    width:26px; height:26px;
    margin-top:1px;
    border-radius:50%;
    border:2px solid var(--ink-soft);
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; color:#fff;
  }
  .shop-item.bought .shop-check{ background: var(--forest); border-color: var(--forest); }
  .shop-main{ flex:1; min-width:120px; }
  .shop-name-row{ display:flex; align-items:center; gap:6px; }
  .shop-item .shop-name{ font-size:15px; }
  .shop-item.bought .shop-name{ text-decoration: line-through; color: var(--ink-soft); }
  .shop-edit{
    background:none; border:none; color: var(--ink-soft);

  }
  .shop-edit:active{ color: var(--copper); }
  .shop-item .shop-cat{ font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color: var(--ink-soft); display:block; }
  .shop-controls{
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
    flex-wrap:wrap;
    margin-left:auto;
  }
  .qty-stepper{
    display:flex; align-items:center; gap:0;
    border:1px solid var(--line); border-radius:6px; overflow:hidden;
    background:#fff;
  }
  .qty-stepper button{
    width:30px; height:30px;
    border:none; background: rgba(28,43,34,0.05);
    font-size:16px; color: var(--ink); cursor:pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .qty-stepper button:active{ background: rgba(28,43,34,0.12); }
  .qty-stepper .qty-val{
    min-width:22px; text-align:center;
    font-family:'IBM Plex Mono', monospace; font-size:14px;
  }
  .shop-item .shop-price-input{
    width:80px;
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    padding:6px 8px;
    border:1px solid var(--line);

    text-align:right;
  }
  .shop-item .shop-line-total{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color: var(--ink-soft);
    width:100%;
    text-align:right;
  }
  .shop-item .del{
    background:none; border:none; color: var(--ink-soft);
    cursor:pointer; font-size:20px; padding:0 0 0 4px;
    flex-shrink:0;
    -webkit-tap-highlight-color: transparent;
  }
  .shop-item .del:active{ color: var(--rust); }

  /* Желания / копилка */
  .wish{
    padding:14px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    margin-bottom:12px;

  .wish-head{
    display:flex; align-items:baseline; gap:8px; margin-bottom:8px;

  .wish-name{ font-weight:600; font-size:15px; flex:1; }
  .wish-price{ font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:14px; }
  .wish-del{

  .wish-del:active{ color: var(--rust); }
  .wish-progress-track{

  .loading{ text-align:center; padding: 40px 0; color: var(--ink-soft); font-size:13px; }

  @media (max-width: 430px){
    .card{ padding: 28px 18px 22px; }
    .row{ flex-wrap: wrap; }

    .row .amount{ margin-left:auto; }
    .row-meta{ padding-left: 0; margin-top: 6px; }
    h1{ font-size: 20px; letter-spacing: 2px; }
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-laTBbPv7cyPjM_KBtHn1qiLQaCdWFq0",
  authDomain: "semeynyy-byudzhet.firebaseapp.com",
  projectId: "semeynyy-byudzhet",
  storageBucket: "semeynyy-byudzhet.firebasestorage.app",
  messagingSenderId: "605154328627",
  appId: "1:605154328627:web:18a256ba9c2240a2156346"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const budgetDocRef = doc(db, "budget", "shared");

const CATEGORIES = ["Продукты","Кафе/Рестораны","Транспорт","Жильё","Развлечения","Здоровье","Одежда","Электроника","Хозтовары","Для дома","Другое"];
const INCOME_CATEGORIES = ["Зарплата","Подработка","Подарок","Возврат","Другое"];
const SHOP_CATEGORIES = CATEGORIES;
const PEOPLE = ["Артемий","Дарья"];

let expenses = [];
let incomes = [];
let budgetLimit = null;
let shopping = [];
let wishes = [];

let activeTab = 'finance';     // finance | shopping | wishes
let financeSub = 'expenses';   // expenses | income
let viewMonth = new Date().toISOString().slice(0,7); // YYYY-MM
let connected = false;
let firstLoad = true;

function fmt(n){
  return n.toLocaleString('ru-RU', {minimumFractionDigits:0, maximumFractionDigits:2});
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function shortDate(iso){ const [y,m,d] = iso.split('-'); return d+'.'+m; }
function monthOf(iso){ return iso ? iso.slice(0,7) : ''; }
function priorityClass(p){
  if(p==='Высокий') return 'priority-high';
  if(p==='Средний') return 'priority-mid';
  return 'priority-low';
}
const MONTH_NAMES = ["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
function monthLabel(ym){
  const [y,m] = ym.split('-');
  return MONTH_NAMES[parseInt(m,10)-1] + ' ' + y;
}
function shiftMonth(ym, delta){
  let [y,m] = ym.split('-').map(Number);
  m += delta;
  if(m<1){ m=12; y--; }
  if(m>12){ m=1; y++; }
  return y + '-' + String(m).padStart(2,'0');
}

onSnapshot(budgetDocRef, (snap)=>{
  connected = true;
  if(snap.exists()){
    const data = snap.data();
    expenses = data.expenses || [];
    incomes = data.incomes || [];
    budgetLimit = (data.budgetLimit === undefined) ? null : data.budgetLimit;
    shopping = data.shopping || [];
    wishes = data.wishes || [];
  }
  firstLoad = false;
  render();
}, (err)=>{
  console.error('Ошибка синхронизации', err);
  connected = false;
  firstLoad = false;
  render();
});

async function saveAll(){
  try{
    await setDoc(budgetDocRef, { expenses, incomes, budgetLimit, shopping, wishes });
  }catch(e){ console.error('Не удалось сохранить данные', e); }
}

function newId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---- Расходы ---- */
function addExpense(amount, category, note, date, place, paymentMethod, recurring, person){
  expenses.push({ id:newId(), amount, category, note, date, place, paymentMethod, recurring, person });
  expenses.sort((a,b)=> a.date < b.date ? 1 : -1);
  saveAll(); render();
}
function deleteExpense(id){ expenses = expenses.filter(e=>e.id!==id); saveAll(); render(); }

/* ---- Доходы ---- */
function addIncome(amount, category, note, date, person){
  incomes.push({ id:newId(), amount, category, note, date, person });
  incomes.sort((a,b)=> a.date < b.date ? 1 : -1);
  saveAll(); render();
}
function deleteIncome(id){ incomes = incomes.filter(e=>e.id!==id); saveAll(); render(); }

/* ---- Список покупок ---- */
function addShopItem(name, category, person){
  shopping.push({ id:newId(), name, category, person, bought:false, price:null, qty:1 });
  saveAll(); render();
}
function deleteShopItem(id){
  const item = shopping.find(s=>s.id===id);
  if(item && item.expenseId) expenses = expenses.filter(e=>e.id!==item.expenseId);
  shopping = shopping.filter(s=>s.id!==id);
  saveAll(); render();
}
function renameShopItem(id){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  const name = prompt('Название товара', item.name);
  if(name===null) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  item.name = trimmed;
  if(item.expenseId){
    const ex = expenses.find(e=>e.id===item.expenseId);
    if(ex) ex.note = trimmed;
  }
  saveAll(); render();
}
function syncShopExpense(item){
  const lineTotal = (item.qty||1) * (item.price||0);
  if(item.bought && item.price){
    if(item.expenseId){
      const ex = expenses.find(e=>e.id===item.expenseId);
      if(ex){ ex.amount = lineTotal; ex.note = item.name + (item.qty>1? ` ×${item.qty}`:''); }
    } else {
      const eid = newId();
      item.expenseId = eid;
      expenses.push({ id:eid, amount:lineTotal, category:item.category||'Другое', note:item.name+(item.qty>1?` ×${item.qty}`:''), date:todayStr(), place:'', paymentMethod:'Карта', recurring:'Разовый', person:item.person });
      expenses.sort((a,b)=> a.date < b.date ? 1 : -1);
    }
  }
  if((!item.bought || !item.price) && item.expenseId){
    expenses = expenses.filter(e=>e.id!==item.expenseId);
    item.expenseId = null;
  }
}
function toggleBought(id){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.bought = !item.bought;
  syncShopExpense(item);
  saveAll(); render();
}
function setShopPrice(id, price){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.price = price;
  syncShopExpense(item);
  saveAll(); render();
}
function changeShopQty(id, delta){
  const item = shopping.find(s=>s.id===id);
  if(!item) return;
  item.qty = Math.max(1, (item.qty||1) + delta);
  syncShopExpense(item);
  saveAll(); render();
}
function clearBoughtShop(){
  if(!confirm('Убрать все купленные товары из списка? (расходы по ним останутся)')) return;
  shopping = shopping.filter(s=>!s.bought);
  saveAll(); render();
}

/* ---- Желания / копилка ---- */
function addWish(name, target, person){
  wishes.push({ id:newId(), name, target, saved:0, person });
  saveAll(); render();
}
function deleteWish(id){ wishes = wishes.filter(w=>w.id!==id); saveAll(); render(); }
function addToWish(id, amount){
  const w = wishes.find(x=>x.id===id);
  if(!w) return;
  w.saved = Math.max(0, (w.saved||0) + amount);
  saveAll(); render();
}

function switchTab(tab){ activeTab = tab; render(); }
function switchSub(sub){ financeSub = sub; render(); }

            <span class="desc">

    body = `
      <form class="add" id="addForm">

        <div><label>Место/магазин</label><input type="text" id="place" placeholder="напр., Пятёрочка"></div>

        <div class="full"><label>Периодичность</label><select id="recurring"><option>Разовый</option><option>Регулярный</option></select></div>
        <div class="full"><label>Заметка</label><input type="text" id="note" placeholder="необязательно"></div>
        <button type="submit" class="submit">Добавить расход</button>

  return monthNav + subtabs + body + totalsBox;

/* ============ РЕНДЕР: СПИСОК ПОКУПОК ============ */
function renderShoppingTab(){
  const boughtSum = shopping.filter(s=>s.bought && s.price).reduce((sum,s)=>sum+(s.qty||1)*s.price,0);
  const boughtCount = shopping.filter(s=>s.bought).length;

  const grouped = {};
  shopping.forEach(s=>{ (grouped[s.category] = grouped[s.category]||[]).push(s); });

  let listHtml='';
  if(shopping.length===0){
    listHtml = '<div class="empty">Список пуст. Добавьте товары ниже.</div>';
  } else {
    listHtml = Object.entries(grouped).map(([cat,items])=>`
      <div class="date-header">${cat}</div>
      ${items.map(s=>{
        const qty = s.qty||1;
        const lineTotal = qty*(s.price||0);
        return `
        <div class="shop-item ${s.bought?'bought':'notbought'}" data-toggle="${s.id}">
          <div class="shop-check">${s.bought?'✓':''}</div>
          <div class="shop-main">
            <div class="shop-name-row">
              <span class="shop-name">${s.name}</span>
              <button class="shop-edit no-toggle" data-edit="${s.id}" aria-label="Переименовать">✎</button>
            </div>
            <span class="shop-cat">${s.person||''}</span>
          </div>
          <div class="shop-controls no-toggle">
            <div class="qty-stepper">
              <button data-qty-minus="${s.id}" aria-label="Меньше">–</button>
              <span class="qty-val">${qty}</span>
              <button data-qty-plus="${s.id}" aria-label="Больше">+</button>
            </div>
            <input class="shop-price-input" type="number" inputmode="decimal" placeholder="цена/шт" value="${s.price!=null?s.price:''}" data-price="${s.id}">
            ${qty>1 && s.price? `<span class="shop-line-total">${fmt(lineTotal)} ₽</span>`:''}
          </div>
          <button class="del no-toggle" data-del-shop="${s.id}" aria-label="Удалить">×</button>
        </div>
      `;}).join('')}
    `).join('');
  }

  return `
    <form class="add" id="shopForm">
      <div class="full"><label>Что купить</label><input type="text" id="sName" placeholder="напр., молоко" required></div>
      <div><label>Категория</label><select id="sCategory">${SHOP_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div><label>Кто</label><select id="sPerson">${PEOPLE.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <button type="submit" class="submit">Добавить в список</button>
    </form>
    <div class="list">${listHtml}</div>

      <div class="row2 total"><span>Потрачено (куплено)</span><span>${fmt(boughtSum)} ₽</span></div>
    </div>
    ${boughtCount>0? '<button class="reset" id="clearBought">Убрать купленные из списка</button>':''}
  `;
}

/* ============ РЕНДЕР: ЖЕЛАНИЯ / КОПИЛКА ============ */
function renderWishesTab(){
  let listHtml='';
  if(wishes.length===0){
    listHtml = '<div class="empty">Пока нет желаний. Добавьте мечту ниже 🙂</div>';
  } else {
    listHtml = wishes.map(w=>{
      const pct = w.target>0 ? Math.min(100, (w.saved/w.target*100)) : 0;
      const done = w.saved>=w.target && w.target>0;
      const left = Math.max(0, w.target - w.saved);
      return `
        <div class="wish">
          <div class="wish-head">
            <span class="wish-name">${w.name}</span>
            <span class="wish-price">${fmt(w.target)} ₽</span>
            <button class="wish-del" data-del-wish="${w.id}" aria-label="Удалить">×</button>
          </div>
          <div class="wish-progress-track"><span class="wish-progress-fill ${done?'done':''}" style="width:${pct}%"></span></div>
          <div class="wish-info">
            <span class="wish-saved">Накоплено: ${fmt(w.saved||0)} ₽ (${pct.toFixed(0)}%)</span>
            <span>${done? '' : 'осталось '+fmt(left)+' ₽'}</span>
          </div>
          ${done? '<div class="wish-done-badge">✓ Цель достигнута!</div>' : `
            <div class="wish-add-row">
              <input type="number" inputmode="decimal" placeholder="отложить сумму" data-wish-input="${w.id}">
              <button data-wish-add="${w.id}">Отложить</button>
            </div>`}
          ${w.person? `<div style="margin-top:6px"><span class="tag person">${w.person}</span></div>`:''}
        </div>`;
    }).join('');
  }

  const totalTarget = wishes.reduce((s,w)=>s+(w.target||0),0);
  const totalSaved = wishes.reduce((s,w)=>s+(w.saved||0),0);

  return `
    <form class="add" id="wishForm">
      <div class="full"><label>Желание / крупная покупка</label><input type="text" id="wName" placeholder="напр., отпуск в горах" required></div>
      <div><label>Цель, ₽</label><input type="number" id="wTarget" step="0.01" min="0" required></div>
      <div><label>Кто хочет</label><select id="wPerson">${PEOPLE.map(p=>`<option>${p}</option>`).join('')}</select></div>
      <button type="submit" class="submit">Добавить желание</button>
    </form>
    <div class="list">${listHtml}</div>
    ${wishes.length? `<div class="totals">
      <div class="row2"><span>Всего накоплено</span><span class="pos">${fmt(totalSaved)} ₽</span></div>
      <div class="row2 total"><span>Общая цель</span><span>${fmt(totalTarget)} ₽</span></div>
    </div>`:''}
  `;
}

/* ============ ГЛАВНЫЙ РЕНДЕР ============ */
function render(){
  const card = document.getElementById('card');
  if(firstLoad){ card.innerHTML = '<div class="loading">Подключение к базе данных…</div>'; return; }

  const totalExpAll = expenses.reduce((s,e)=>s+e.amount,0);
  const totalIncAll = incomes.reduce((s,e)=>s+e.amount,0);
  const balance = totalIncAll - totalExpAll;

  let content = '';
  if(activeTab==='finance') content = renderFinanceTab();
  else if(activeTab==='shopping') content = renderShoppingTab();
  else content = renderWishesTab();

  card.innerHTML = `
    <h1>Гроссбух</h1>
    <div class="sub">семейный бюджет</div>
    <div class="sync-status ${connected?'':'offline'}">${connected?'● синхронизировано':'○ нет связи с базой'}</div>
    <div class="balance-bar">
      <span>Общий баланс</span>
      <span class="balance-val ${balance<0?'neg':'pos'}">${balance>=0?'+':''}${fmt(balance)} ₽</span>
    </div>
    <button id="enablePush" style="margin-bottom:14px;width:100%;padding:10px;border-radius:6px;border:1px solid var(--line);background:#fff;font-family:'Bitter',Georgia,serif;font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;">Включить уведомления</button>
    <div class="tabs">
      <button class="tab ${activeTab==='finance'?'active':''}" id="tabFinance">Финансы</button>
      <button class="tab ${activeTab==='shopping'?'active':''}" id="tabShopping">Покупки</button>
      <button class="tab ${activeTab==='wishes'?'active':''}" id="tabWishes">Желания</button>
    </div>
    ${content}
  `;

  document.getElementById('enablePush').onclick = ()=>{
    if(window.OneSignalDeferred){
      window.OneSignalDeferred.push(function(OneSignal){ OneSignal.Notifications.requestPermission(); });
    }
  };

  document.getElementById('tabFinance').onclick = ()=>switchTab('finance');
  document.getElementById('tabShopping').onclick = ()=>switchTab('shopping');
  document.getElementById('tabWishes').onclick = ()=>switchTab('wishes');

  if(activeTab==='finance'){
    document.getElementById('prevMonth').onclick = ()=>{ viewMonth = shiftMonth(viewMonth,-1); render(); };
    document.getElementById('nextMonth').onclick = ()=>{ viewMonth = shiftMonth(viewMonth,1); render(); };
    document.getElementById('subExp').onclick = ()=>switchSub('expenses');
    document.getElementById('subInc').onclick = ()=>switchSub('income');

    if(financeSub==='expenses'){
      const f = document.getElementById('addForm');
      f.onsubmit = (ev)=>{
        ev.preventDefault();
        const amount = parseFloat(document.getElementById('amount').value);
        if(!amount || amount<=0) return;
        addExpense(amount,
          document.getElementById('category').value,
          document.getElementById('note').value.trim(),
          document.getElementById('date').value || todayStr(),
          document.getElementById('place').value.trim(),
          document.getElementById('paymentMethod').value,
          document.getElementById('recurring').value,
          document.getElementById('person').value);
      };
      card.querySelectorAll('[data-del-exp]').forEach(b=> b.onclick=()=>deleteExpense(b.getAttribute('data-del-exp')));
    } else {
      const f = document.getElementById('incomeForm');
      f.onsubmit = (ev)=>{
        ev.preventDefault();
        const amount = parseFloat(document.getElementById('iAmount').value);
        if(!amount || amount<=0) return;
        addIncome(amount,
          document.getElementById('iCategory').value,
          document.getElementById('iNote').value.trim(),
          document.getElementById('iDate').value || todayStr(),
          document.getElementById('iPerson').value);
      };
      card.querySelectorAll('[data-del-inc]').forEach(b=> b.onclick=()=>deleteIncome(b.getAttribute('data-del-inc')));
    }
  } else if(activeTab==='shopping'){
    document.getElementById('shopForm').onsubmit = (ev)=>{
      ev.preventDefault();
      const name = document.getElementById('sName').value.trim();
      if(!name) return;
      addShopItem(name, document.getElementById('sCategory').value, document.getElementById('sPerson').value);
    };
    card.querySelectorAll('.shop-item').forEach(el=>{
      el.addEventListener('click', (ev)=>{
        if(ev.target.closest('.no-toggle')) return;
        toggleBought(el.getAttribute('data-toggle'));
      });
    });
    card.querySelectorAll('[data-del-shop]').forEach(b=> b.onclick=()=>deleteShopItem(b.getAttribute('data-del-shop')));
    card.querySelectorAll('[data-edit]').forEach(b=> b.onclick=()=>renameShopItem(b.getAttribute('data-edit')));
    card.querySelectorAll('[data-qty-minus]').forEach(b=> b.onclick=()=>changeShopQty(b.getAttribute('data-qty-minus'), -1));
    card.querySelectorAll('[data-qty-plus]').forEach(b=> b.onclick=()=>changeShopQty(b.getAttribute('data-qty-plus'), 1));
    card.querySelectorAll('[data-price]').forEach(inp=>{
      inp.onchange = ()=>{
        const v = parseFloat(inp.value);
        setShopPrice(inp.getAttribute('data-price'), isNaN(v)? null : v);
      };
    });
    const cb = document.getElementById('clearBought');
    if(cb) cb.onclick = clearBoughtShop;
  } else {
    document.getElementById('wishForm').onsubmit = (ev)=>{
      ev.preventDefault();
      const name = document.getElementById('wName').value.trim();
      const target = parseFloat(document.getElementById('wTarget').value);
      if(!name || !target || target<=0) return;
      addWish(name, target, document.getElementById('wPerson').value);
    };
    card.querySelectorAll('[data-del-wish]').forEach(b=> b.onclick=()=>deleteWish(b.getAttribute('data-del-wish')));
    card.querySelectorAll('[data-wish-add]').forEach(b=>{
      b.onclick = ()=>{
        const id = b.getAttribute('data-wish-add');
        const inp = card.querySelector(`[data-wish-input="${id}"]`);
        const v = parseFloat(inp.value);
        if(!v || v<=0) return;
        addToWish(id, v);
      };
    });
  }
}
</script>
</body>
</html>
